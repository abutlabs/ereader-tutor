name: EAS Build (Android)

# Builds an Android binary on Expo's cloud (EAS Build), downloads it back to the
# runner, and publishes it to GitHub:
#   • every run  → a workflow Artifact (download from the run's summary page)
#   • tag builds → also attached to the GitHub Release for that tag
#
#   profile = preview    → APK (sideloadable beta)
#   profile = production → AAB (for the Play Store)
#
# NOTE: GitHub *Packages* has no APK package type, so the binary goes to Releases /
# Artifacts instead — that's the supported way to host an app binary on GitHub.
#
# Trigger manually (Actions tab → Run workflow → pick a profile), or push a tag like
# v0.1.0-beta.1 (builds production + creates/updates that Release).
#
# Requires repo secret EXPO_TOKEN (expo.dev → Account → Settings → Access tokens).

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        type: choice
        options:
          - preview
          - production
        default: preview
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to upload assets to a Release

jobs:
  build:
    name: Build & publish Android (${{ github.event.inputs.profile || 'production' }})
    runs-on: ubuntu-latest
    env:
      # `secrets` can't be used in step `if:` expressions, so expose it as env.
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Fail early if EXPO_TOKEN is missing
        if: ${{ env.EXPO_TOKEN == '' }}
        run: |
          echo "::error::EXPO_TOKEN secret is not set. Add it in Settings → Secrets and variables → Actions."
          exit 1

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Resolve build profile
        id: cfg
        run: |
          PROFILE="${{ github.event.inputs.profile }}"
          PROFILE="${PROFILE:-production}"
          echo "profile=$PROFILE" >> "$GITHUB_OUTPUT"
          if [ "$PROFILE" = "production" ]; then
            echo "ext=aab" >> "$GITHUB_OUTPUT"
          else
            echo "ext=apk" >> "$GITHUB_OUTPUT"
          fi

      - name: Build on EAS (wait) and capture the artifact URL
        id: build
        run: |
          set -o pipefail
          eas build \
            --platform android \
            --profile "${{ steps.cfg.outputs.profile }}" \
            --non-interactive --json --wait | tee build.json
          URL="$(jq -r '.[0].artifacts.applicationArchiveUrl // .[0].artifacts.buildUrl' build.json)"
          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "::error::Could not find a downloadable artifact URL in the EAS build output."
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Download the binary from EAS
        run: |
          NAME="ereader-tutor-${{ steps.cfg.outputs.profile }}.${{ steps.cfg.outputs.ext }}"
          curl -fL -o "$NAME" "${{ steps.build.outputs.url }}"
          ls -lh "$NAME"

      - name: Upload as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ereader-tutor-${{ steps.cfg.outputs.profile }}
          path: "ereader-tutor-*.${{ steps.cfg.outputs.ext }}"
          if-no-files-found: error
          retention-days: 90

      # Publish to Releases so there's a stable download page:
      #   • tag push  → a named release for that tag (e.g. v0.1.0-beta.1)
      #   • manual run → a rolling "Beta (latest)" prerelease at tag `beta`
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'beta' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Beta (latest)' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: "ereader-tutor-*.${{ steps.cfg.outputs.ext }}"
